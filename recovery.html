<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NiceDrop | Password Recovery</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="app-page">

    <main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">

        <div
            style="width:min(100%,520px);background:white;padding:36px;box-shadow:-5px 5px 0 rgba(0,0,0,0.30);border:1px solid rgba(0,0,0,0.08);">

            <h2>Reset Password</h2>
            <p id="message" class="hero-text">Enter your new password below to recover your account.</p>

            <form id="recoveryForm" style="margin-top:24px;">

                <label for="password">New Password</label>
                <br>
                <input type="password" id="password" name="password" required placeholder="Enter new password"
                    style="width:100%;padding:16px 14px;font-size:18px;border-radius:0;">

                <br><br>

                <label for="passwordConfirm">Confirm Password</label>
                <br>
                <input type="password" id="passwordConfirm" name="passwordConfirm" required
                    placeholder="Confirm new password"
                    style="width:100%;padding:16px 14px;font-size:18px;border-radius:0;">

                <div class="buttons" style="margin-top:20px;">
                    <button type="submit" id="submitBtn" class="btn">Update Password</button>
                </div>

            </form>

        </div>

    </main>

    <script src="script.js"></script>
    <script src="supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

    <script type="module">
        console.log("RECOVERY SCRIPT STARTED")

        const form = document.getElementById("recoveryForm");
        const messageEl = document.getElementById("message");
        const submitBtn = document.getElementById("submitBtn");

        let client = null;
        let hasValidRecoverySession = false;

        function isMobileDevice() {
            return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
        }

        function showMessage(text, isError = false) {
            messageEl.textContent = text;
            messageEl.style.color = isError ? "red" : "";
        }

        async function initRecoverySession() {
            console.log("INIT START")

            if (!client) {
                showMessage("Configure Supabase in supabase-config.js to use recovery.", true);
                return;
            }

            submitBtn.disabled = true;

            const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
            const accessToken = hashParams.get("access_token");
            const refreshToken = hashParams.get("refresh_token");
            const type = hashParams.get("type");

            console.log("HASH:", window.location.hash)

            if (type === "recovery" && accessToken && refreshToken) {
                console.log("Recovery detected")

                const { error } = await client.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken
                });

                if (error) {
                    console.error(error)
                    showMessage("Invalid or expired link", true);
                    return;
                }

                // clean URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            const { data, error } = await client.auth.getSession();

            console.log("SESSION:", data)

            if (error || !data.session) {
                showMessage("Open this page from your email recovery link.", true);
                return;
            }

            hasValidRecoverySession = true;
            submitBtn.disabled = false;
            showMessage("Enter your new password.");
        }

        // Initialize Supabase and then recovery
        async function initApp() {
            const config = window.supabaseConfig;
            if (!config || !config.isConfigured || !config.isConfigured()) {
                showMessage("Configure Supabase in supabase-config.js to use recovery.", true);
                return;
            }

            try {
                await config.init();
                client = config.getClient();
                if (client) {
                    initRecoverySession();
                }
            } catch (err) {
                console.error("Failed to initialize Supabase:", err);
                showMessage("Failed to initialize Supabase.", true);
            }
        }

        initApp();

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            if (!hasValidRecoverySession) return;

            const password = document.getElementById("password").value;
            const confirm = document.getElementById("passwordConfirm").value;

            if (password !== confirm) {
                showMessage("Passwords do not match", true);
                return;
            }

            form.style.display = "none";
            showMessage("Updating password..");

            const { error } = await client.auth.updateUser({ password });

            if (error) {
                showMessage(error.message, true);
                form.style.display = "block";
                return;
            }

            showMessage("Password updated!");

            setTimeout(() => {
                if (isMobileDevice()) {
                    window.location.href = "io.supabase.flutter://login-callback";
                    return;
                }

                window.location.href = "index.html";
            }, 1500);
        });

        function showMessage(text, isError = false) {
            messageEl.textContent = text;
            messageEl.style.color = isError ? "red" : "";
        }
    </script>

</body>

</html>
