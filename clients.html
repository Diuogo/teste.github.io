<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NiceDrop | Clientes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="clients.css">
</head>

<body class="dashboard-page">

    <a class="skip-link" href="#main">Skip to content</a>

    <!-- NAVBAR -->
    <header class="navbar dashboard-navbar" style="display: none;">
        <a href="index.html" class="logo-wrap">
            <img src="nicedrop.png" class="logo" alt="NiceDrop logo">
        </a>
    </header>

    <main id="main" class="dashboard-container">

        <!-- LEFT SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="user-avatar">👤</div>
                <div class="user-email" id="userEmail">diogo@gmail.com</div>
            </div>

            <div class="stores-section">
                <h3>Lojas</h3>
                <div class="stores-list">
                    <!-- Populated by JavaScript -->
                </div>
            </div>

            <div style="margin-top: auto; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.2);">
                <button class="btn-logout">LOGOUT</button>
            </div>
        </aside>

        <!-- CENTER CONTENT -->
        <section class="main-content">

            <!-- PAGE HEADER -->
            <div class="content-header">
                <h1 id="pageTitle">Clientes</h1>
                <button class="btn-add-client" id="btnAddClient">+ Adicionar cliente</button>
            </div>

            <!-- CLIENTS TABLE -->
            <div class="clients-container">
                <table class="clients-table">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Contacto</th>
                            <th>Loja</th>
                            <th>Encomendas</th>
                            <th>Status</th>
                            <th>Data de Registo</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="clientsTableBody">
                        <!-- Populated by JavaScript -->
                    </tbody>
                </table>
            </div>

        </section>

    </main>

    <!-- MODAL: Add/Edit Client -->
    <div class="modal" id="clientModal">
        <div class="modal-overlay" onclick="closeClientModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Adicionar Cliente</h3>
                <button class="modal-close" onclick="closeClientModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="clientName" placeholder="Nome completo" class="form-input">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="clientEmail" placeholder="email@example.com" class="form-input">
                </div>

                <div class="form-group">
                    <label>Contacto</label>
                    <input type="tel" id="clientPhone" placeholder="+351 9XX XXX XXX" class="form-input">
                </div>

                <div class="form-group">
                    <label>Loja</label>
                    <select id="clientStore" class="form-input">
                        <option value="">Selecionar loja...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select id="clientStatus" class="form-input">
                        <option value="active">Ativo</option>
                        <option value="inactive">Inativo</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-outline" onclick="closeClientModal()">Cancelar</button>
                <button class="btn-primary" onclick="saveClient()">Guardar</button>
            </div>
        </div>
    </div>

    <!-- MODAL: View Client Details -->
    <div class="modal" id="detailsModal">
        <div class="modal-overlay" onclick="closeDetailsModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="detailsTitle">Detalhes do Cliente</h3>
                <button class="modal-close" onclick="closeDetailsModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="detail-row">
                    <span class="label">Nome:</span>
                    <span id="detailName">-</span>
                </div>
                <div class="detail-row">
                    <span class="label">Email:</span>
                    <span id="detailEmail">-</span>
                </div>
                <div class="detail-row">
                    <span class="label">Contacto:</span>
                    <span id="detailPhone">-</span>
                </div>
                <div class="detail-row">
                    <span class="label">Loja:</span>
                    <span id="detailStore">-</span>
                </div>
                <div class="detail-row">
                    <span class="label">Encomendas Totais:</span>
                    <span id="detailOrders">0</span>
                </div>
                <div class="detail-row">
                    <span class="label">Status:</span>
                    <span id="detailStatus">-</span>
                </div>
                <div class="detail-row">
                    <span class="label">Data de Registo:</span>
                    <span id="detailDate">-</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-outline" onclick="closeDetailsModal()">Fechar</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="clients.js"></script>

</body>

</html>
