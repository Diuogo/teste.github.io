<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NiceDrop | Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dashboard-page">
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <!-- Logo -->
            <div class="sidebar-logo">
                <img src="nicedrop.png" alt="NICEDROP" height="36">
            </div>
            
            <!-- User Info -->
            <div class="sidebar-user">
                <div class="user-avatar" id="userAvatar">D</div>
                <div class="user-name" id="userName">Developer</div>
                <div class="user-role" id="userRole">DEVELOPER</div>
            </div>
            
            <!-- Lojas Section -->
            <div class="sidebar-section-label">LOJAS</div>
            <nav class="sidebar-stores" id="sidebarStores">
                <!-- Rendered by JS -->
            </nav>
            
            <!-- Actions Section (developer only) -->
            <div class="sidebar-section-label" id="actionLabel" style="display: none;">AÇÕES</div>
            <div class="sidebar-actions" id="sidebarActions" style="display: none;">
                <button class="action-btn" id="createStoreBtn">+ CRIAR LOJA</button>
                <button class="action-btn" id="addDroneBtn">+ ADICIONAR DRONE</button>
            </div>
            
            <!-- Logout -->
            <div class="sidebar-logout">
                <button id="logoutBtn">← SAIR</button>
            </div>
        </aside>
        
        <!-- MAIN AREA -->
        <main class="main-area">
            <!-- Top Bar -->
            <div class="main-topbar" id="mainTopbar">
                <h1 class="store-title" id="storeTitle">Seleccione uma loja</h1>
                <div class="store-meta" id="storeMeta"></div>
            </div>
            
            <!-- Content Grid -->
            <div class="content-grid" id="contentGrid">
                <!-- Stats -->
                <div class="stats-row" id="statsRow"></div>
                
                <!-- Team & Drones -->
                <div class="detail-row" id="detailRow"></div>
            </div>
            
            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <p>SELECCIONE UMA LOJA PARA COMEÇAR</p>
            </div>
        </main>
    </div>
    
    <!-- MODALS -->
    <div class="modal-overlay" id="modalOverlay"></div>
    
    <!-- Create Store Modal -->
    <div class="modal" id="createStoreModal">
        <h2>CRIAR LOJA</h2>
        <form id="createStoreForm">
            <div class="form-group">
                <label>Nome da loja</label>
                <input type="text" id="createStoreName" placeholder="Ex: Porto Central">
            </div>
            <div class="form-group">
                <label>Cidade</label>
                <input type="text" id="createStoreCity" placeholder="Ex: Porto">
            </div>
            <div class="form-group">
                <label>Email do dono</label>
                <input type="email" id="createStoreOwner" placeholder="Ex: owner@nicedrop.pt">
            </div>
            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="closeModal('createStoreModal')">Cancelar</button>
                <button type="submit" class="btn-primary">Criar</button>
            </div>
            <div class="form-error" id="createStoreError"></div>
        </form>
    </div>
    
    <!-- Add Drone Modal -->
    <div class="modal" id="addDroneModal">
        <h2>ADICIONAR DRONE</h2>
        <form id="addDroneForm">
            <div class="form-group">
                <label>Loja</label>
                <select id="addDroneStore">
                    <!-- Rendered by JS -->
                </select>
            </div>
            <div class="form-group">
                <label>Nome do drone</label>
                <input type="text" id="addDroneName" placeholder="Ex: Falcon I">
            </div>
            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="closeModal('addDroneModal')">Cancelar</button>
                <button type="submit" class="btn-primary">Adicionar</button>
            </div>
            <div class="form-error" id="addDroneError"></div>
        </form>
    </div>
    
    <!-- Add Member Modal -->
    <div class="modal" id="addMemberModal">
        <h2>ADICIONAR MEMBRO</h2>
        <form id="addMemberForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="addMemberEmail" placeholder="Ex: op@nicedrop.pt">
            </div>
            <div class="form-group">
                <label>Função</label>
                <select id="addMemberRole">
                    <option value="operator">OPERADOR</option>
                    <option value="owner">OWNER</option>
                </select>
            </div>
            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="closeModal('addMemberModal')">Cancelar</button>
                <button type="submit" class="btn-primary">Adicionar</button>
            </div>
            <div class="form-error" id="addMemberError"></div>
        </form>
    </div>
    
    <script src="dashboard.js"></script>
</body>
</html>
